<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Konchi - Checkout</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="styles.css?v=23" rel="stylesheet" />
</head>

<body class="page-checkout">
  <header class="header" id="top">
    <div class="container">
      <div class="header__inner header__inner--centerLogo">
        <button class="icon-btn icon-btn--square hbtn" id="backStep1Btn" type="button" aria-label="Volver">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>

        <a class="brand brand--center header__logo" href="index.html" aria-label="Inicio">
          <img class="brand__img" src="img/logo/logotransparente-convertido-de-png.svg" alt="Konchi" />
        </a>

        <button type="button" class="icon-btn icon-btn--square hbtn hbtn--ghost" aria-hidden="true" tabindex="-1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <section class="section checkout-main">
    <div class="container">
      <div class="checkoutFlow" id="checkoutFlow">
        <div class="checkoutFlow__track" id="checkoutTrack">
          <div class="checkoutStep">
            <div class="checkout-step1">
              <div class="top-row">
                <h2 class="page-title">Tu pedido</h2>
                <button type="button" id="clearCheckoutBtn" class="vaciar-btn cart__clear" style="display: none">
                  <span>Vaciar</span>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                </button>
              </div>

              <div class="checkout__card cart-card">
                <div id="checkoutItems" class="cart-items"></div>
                <div id="checkoutTotals" class="cart-totals"></div>
                <div class="cart-footer">
                  <button type="button" class="continue-btn checkout__cta" id="goStep2Btn">Continuar</button>
                </div>
              </div>
            </div>
          </div>

          <div class="checkoutStep">
            <div class="checkout-step2">
              <div class="checkout__card cart-card cart-card--form checkout-data">
                <h2 class="checkout__title checkout__title--step2">Datos del Pedido</h2>
                <label class="field-label checkout-data__prompt">¿Cómo querés recibirlo?</label>
                <div class="delivery-opts" id="deliveryOpts" role="tablist" aria-label="Método de entrega">
                  <button type="button" class="delivery-btn is-active" data-method="retiro" role="tab"
                    aria-selected="true" id="tab-retiro">
                    <span class="delivery-icon" aria-hidden="true">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 21h18v-8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8z" />
                        <path d="M3 7l2-4h14l2 4" />
                        <path d="M12 11v10" />
                        <path d="M10 11h4" />
                      </svg>
                    </span>
                    <span class="delivery-name">Retiro</span>
                  </button>

                  <button type="button" class="delivery-btn" data-method="envio" role="tab" aria-selected="false"
                    id="tab-envio">
                    <span class="delivery-icon" aria-hidden="true">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 18V6a2 2 0 0 0-2-2H3a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h1" />
                        <path d="M15 18h2" />
                        <path d="M19 18h2a2 2 0 0 0 2-2v-3.65a2 2 0 0 0-.35-1.15l-2.15-2.15a2 2 0 0 0-1.35-.55H15" />
                        <path d="M3 6h11" />
                        <circle cx="7" cy="18" r="2" />
                        <circle cx="17" cy="18" r="2" />
                      </svg>
                    </span>
                    <span class="delivery-name">Envío</span>
                  </button>
                </div>

                <div class="delivery-info" id="deliveryInfo" role="tabpanel" aria-live="polite"></div>

                <div class="form-divider form-divider--lines">
                  <span>Tus datos de contacto</span>
                </div>

                <div class="checkout__form">
                  <div class="form-row">
                    <label class="field">
                      <span>Nombre y Apellido</span>
                      <input id="custName" type="text" placeholder="Ej: María González" autocomplete="name" />
                    </label>
                    <label class="field">
                      <span>Teléfono / WhatsApp</span>
                      <input id="custPhone" type="tel" placeholder="Ej: 11 1234 1212" autocomplete="tel" />
                    </label>
                  </div>

                  <div id="addressFieldWrapper" style="display: none">
                    <div class="form-row">
                      <label class="field">
                        <span>Calle</span>
                        <input id="custStreet" type="text" placeholder="Ej: Av. Cabildo" autocomplete="street-address" />
                      </label>
                      <label class="field">
                        <span>Numero</span>
                        <input id="custNumber" type="text" inputmode="numeric" placeholder="1234" />
                      </label>
                    </div>
                    <label class="field">
                      <span>Piso / Depto / Referencia</span>
                      <input id="custRef" type="text" placeholder="Ej: 4B, casa con rejas..." />
                    </label>
                  </div>

                  <label class="field">
                    <span>Notas (opcional)</span>
                    <textarea id="custNotes" rows="2"
                      placeholder="Alguna aclaración sobre la entrega o pedido..."></textarea>
                  </label>
                </div>

                <div class="payment-static payment-card">
                  <span class="payment-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                      stroke-linecap="round" stroke-linejoin="round">
                      <path d="M4 10h3v10H4V10zm7.5 0h3v10h-3V10zm7.5 0h3v10h-3V10zM12 1L2 6v2h20V6L12 1zM2 22h20v-3H2v3z" />
                    </svg>
                  </span>
                  <div class="payment-text">
                    <strong>Medio de Pago: Transferencia</strong>
                    <span>Te pasaremos los datos al confirmar.</span>
                  </div>
                </div>
              </div>

              <button type="button" class="btn btn-instagram checkout__cta btn-checkout-send" id="sendWhatsAppBtn">
                <span class="btn-checkout-send__label">Enviar pedido por Instagram</span>
                <svg class="btn-checkout-send__ig" width="22" height="22" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                  aria-hidden="true">
                  <rect x="3" y="3" width="18" height="18" rx="5" />
                  <circle cx="12" cy="12" r="4" />
                  <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <template id="tplCheckoutEmpty">
    <div class="empty-card">
      <svg class="empty-card__illo" viewBox="0 0 140 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="52" cy="104" r="8" fill="#c8dca0" stroke="#5A7F3A" stroke-width="2" />
        <circle cx="52" cy="104" r="3" fill="#5A7F3A" />
        <circle cx="96" cy="104" r="8" fill="#c8dca0" stroke="#5A7F3A" stroke-width="2" />
        <circle cx="96" cy="104" r="3" fill="#5A7F3A" />
        <rect x="30" y="52" width="80" height="46" rx="6" fill="#E8F0D4" stroke="#5A7F3A" stroke-width="2" />
        <line x1="47" y1="52" x2="47" y2="98" stroke="#5A7F3A" stroke-width="1.5" stroke-dasharray="3 3" />
        <line x1="63" y1="52" x2="63" y2="98" stroke="#5A7F3A" stroke-width="1.5" stroke-dasharray="3 3" />
        <line x1="79" y1="52" x2="79" y2="98" stroke="#5A7F3A" stroke-width="1.5" stroke-dasharray="3 3" />
        <line x1="95" y1="52" x2="95" y2="98" stroke="#5A7F3A" stroke-width="1.5" stroke-dasharray="3 3" />
        <rect x="26" y="46" width="88" height="10" rx="5" fill="#c8dca0" stroke="#5A7F3A" stroke-width="2" />
        <path d="M114 51 Q124 40 124 28 Q124 18 115 18 L32 18" stroke="#5A7F3A" stroke-width="3" stroke-linecap="round"
          fill="none" />
        <rect x="50" y="32" width="40" height="28" rx="6" fill="#fff" stroke="#c8dca0" stroke-width="1.5" opacity="0.6" />
        <path d="M58 32 Q58 24 70 24 Q82 24 82 32" stroke="#c8dca0" stroke-width="1.5" fill="none" opacity="0.6" />
      </svg>
      <div class="empty-card__title">Tu carrito está vacío</div>
      <div class="empty-card__sub">Agregá productos para empezar tu pedido.</div>
      <button type="button" class="empty-card__btn"
        onclick="window.location.href='index.html#catalogo'">VER PRODUCTOS</button>
    </div>
  </template>

  <div class="confirm-modal" id="confirmModal" aria-hidden="true">
    <div class="confirm-modal__overlay"></div>
    <div class="confirm-modal__card">
      <div class="confirm-modal__icon">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
      </div>
      <h3 class="confirm-modal__title">¿Vaciar carrito?</h3>
      <p class="confirm-modal__text">
        ¿Estás seguro que querés borrar todos los productos del carrito?
      </p>
      <div class="confirm-modal__actions">
        <button class="btn btn--ghost" id="cancelClearBtn" type="button">Cancelar</button>
        <button class="btn btn--danger" id="confirmClearBtn" type="button">Sí, vaciar</button>
      </div>
    </div>
  </div>

  <script src="productos.js?v=18"></script>
  <script src="checkout.js?v=23"></script>
</body>

</html>
